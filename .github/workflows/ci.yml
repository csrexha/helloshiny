name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6'

      - name: Cache rv library
        uses: actions/cache@v4
        with:
          path: rv/library
          key: rv-${{ hashFiles('rv.lock') }}
          restore-keys: rv-

      - name: Install rv
        run: |
          curl -sSL https://raw.githubusercontent.com/A2-ai/rv/refs/heads/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libuv1-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            chromium-browser

      - name: Install dependencies
        run: rv sync

      - name: Run tests
        run: rv run -e "pkgload::load_all(); testthat::test_dir('tests/testthat', reporter = 'progress')"
